    <script>
     //In JavaScript, conditional statements are used to perform different actions based on different conditions, which evaluate to either true or false. The primary types of conditional statements are if, else, else if, the switch statement, and the ternary operator (? :). 
        //1. if statement: It executes a block of code if a specified condition is true.
        let age=19;
        if(age>=18){
            console.log("Valid age for voting");
        }

        //if-else statement: It executes one block of code if a specified condition is true, and another block of code if the condition is false.
        if(age<18){
            console.log("wait for next year");
        }
        else{
            console.log("You are not eligible to vote.");
        }
        //switch....evaluates an expression and executes code based on matching case clauses. It is often used as an alternative to multiple if-else statements when there are many conditions to evaluate.
       let grade="A";
       switch(grade){
        case'A': result="First Division";
        break;
        case 'B': result="Second Division";
        break;
        case 'C': result="Third Division";
        break;
        default: result="Fail";
       }
       console.log(result);
