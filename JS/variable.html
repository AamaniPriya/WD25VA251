<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script Variable</h1>
    <script>
        //variable are container in js
        var my_name="Aamani";
        document.write(my_name);
        console.log(my_name);
        //js execution and scope(global and local)

        function demo(){
            var msg="thanks";
            document.write(msg);}
            demo();
            //var declaration using let and const
            let msg2= "Thanks again";
            console.log(msg2);
            const msg3="Thanks to visit my page";
            console.log(msg3);
        
    </script>
</body>
</html>
