<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //normal function without parameter
        function demo()
        {
            console.log("Hello Js")
        }
        demo();
        //normal function with parameter
        function demo1(text)
        {
            console.log("hello"+ text)
        }
        demo1("React");
        
//function with default parameter
function add(a, b=10){
    console.log("addition of two number is "+ (a+b));
}
add(4);
//An anonymous function in JavaScript is a function that does not have an identifier (name) associated 
//with it. They are primarily defined using function expressions or the concise ES6 arrow
// function syntax

let cal=function(){
    var num1=3;
    var num2=4;
    var res=num1+num2;
    console.log("multiply of num1 and num2 " + res);
}
cal();

//arrow functions with multiline statement
let div=(x,y)=>{
    var num1=x;
    var num2=y;
    var res=x/y;
    console.log("division is "+ res);
}
div(12,3);
//arrow functions with singleline statement
let msg=()=>console.log("Hello ABES");
msg();
//callback function:A callback function in JavaScript is a function passed as an 
//argument to another function, which is then invoked (executed) inside the outer function at a later
// point in time to complete a specific task. 
function sub(){
    var num1=2;
    var num2= 6;
    var res=num1-num2;
    //callback res()
}
    function displayRes(res){
        console.log("Result is: " + res);
    }
    sub(displayRes);
    //callback using setTimeOut API

    function msg1(){
        console.log("Welcome to ABES");
    }
    setTimeout(msg1,2000);
</script>
</body>
</html>
